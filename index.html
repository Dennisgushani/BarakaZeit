<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licht des Islam - Gebetszeiten</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* DEIN CSS CODE */
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: 
                radial-gradient(circle at 30% 20%, rgba(138, 43, 226, 0.3) 0%, transparent 50%), 
                radial-gradient(circle at 70% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%), 
                linear-gradient(135deg, #0A0F29 0%, #1A1F39 100%);
            color: #FFFFFF;
            font-family: 'Poppins', sans-serif;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .time-row {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin: 15px auto;
            padding: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .time-row:hover {
            transform: scale(1.02);
            border-color: rgba(255, 215, 0, 0.4);
        }

        .gold-symbol {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.7));
            margin-right: 20px;
            font-size: 24px;
        }

        .time-info {
            flex-grow: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .label {
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .time {
            font-weight: 600;
            font-size: 1.2rem;
            color: #FFD700; /* Gold */
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-bottom: 30px; font-weight: 300;">Gebetszeiten</h2>

    <div class="time-row">
        <div class="gold-symbol">🌙</div>
        <div class="time-info">
            <span class="label">Fajr</span>
            <span class="time">05:14</span>
        </div>
    </div>

    <div class="time-row">
        <div class="gold-symbol">☀️</div>
        <div class="time-info">
            <span class="label">Dhuhr</span>
            <span class="time">13:22</span>
        </div>
    </div>

    <div class="time-row">
        <div class="gold-symbol">✨</div>
        <div class="time-info">
            <span class="label">Maghrib</span>
            <span class="time">18:45</span>
        </div>
    </div>
</div>

</body>
