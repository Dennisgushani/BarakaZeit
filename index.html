<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarakaZeit</title>
<style>
/* --- GLOBAL STYLES --- */
:root {
  --gold: #FFD700;
  --bg-dark: #0A0F29;
  --bg-light: #1A1F39;
  --text-white: #FFFFFF;
  --glass-bg: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 215, 0, 0.1);
}

body {
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at 30% 20%, rgba(138, 43, 226, 0.3) 0%, transparent 50%),
              radial-gradient(circle at 70% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
              linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
  color: var(--text-white);
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

/* Base64 Logo */
header {
  text-align: center;
  margin-top: 20px;
  margin-bottom: 25px;
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  margin: 0;
  color: var(--gold);
  text-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
header .logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 10px;
}
header .logo-icon {
  width: 150px;
  height: auto;
  margin-bottom: 5px;
}

/* Tabs */
.tabs {
  width: 100%;
  max-width: 420px;
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
  background-color: transparent;
  padding: 0;
  border-bottom: 2px solid rgba(255,255,255,0.1);
}
.tab {
  padding: 15px 25px;
  cursor: pointer;
  color: rgba(255,255,255,0.6);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tab.active {
  color: var(--gold);
  border-bottom: 2px solid var(--gold);
}
.tab-icon {
  width: 20px;
  height: 20px;
}

/* Sections */
.tab-content {
  display: none;
  width: 100%;
  max-width: 420px;
}
.tab-content.active {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* City Search */
#searchContainer {
  width: 100%;
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
#searchInput {
  flex: 1;
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  background: white;
  color: #333;
  font-size: 16px;
}
#searchBtn {
  padding: 12px 20px;
  background-color: var(--gold);
  border: none;
  border-radius: 25px;
  cursor: pointer;
  color: #333;
  font-weight: bold;
}
#locationBtn {
  padding: 12px;
  background-color: var(--glass-bg);
  border: none;
  border-radius: 25px;
  cursor: pointer;
}
#locationIcon {
  width: 20px;
  height: 20px;
  fill: var(--gold);
}

/* Dropdowns */
.dropdown-container {
  width: 100%;
  margin-bottom: 15px;
}
.dropdown-select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: var(--glass-bg);
  color: var(--text-white);
}

/* Prayer Grid & Tiles */
.prayer-summary {
  width: 100%;
  text-align: center;
  margin-bottom: 15px;
}
#cityName {
  font-size: 1.8rem;
  font-weight: bold;
  margin-bottom: 5px;
}
#dateTime {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.8);
}
#hijriDate {
  font-size: 0.9rem;
  color: var(--gold);
}

#nextPrayerCard {
  background: var(--glass-bg);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 20px;
  width: 100%;
  text-align: center;
  margin-bottom: 20px;
  box-sizing: border-box;
}
#nextPrayerLabel {
  text-transform: uppercase;
  color: var(--gold);
  font-size: 0.9rem;
}
#nextPrayerName {
  font-size: 2rem;
  font-weight: bold;
  margin-bottom: 5px;
}
#nextPrayerCountdown {
  font-size: 3rem;
  font-weight: bold;
  color: var(--gold);
  margin-bottom: 10px;
}
#remainingLabel {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.6);
}

#gridTitle {
  font-size: 1.5rem;
  font-weight: bold;
  color: var(--gold);
  width: 100%;
  text-align: left;
  margin-bottom: 15px;
}
.prayer-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  width: 100%;
  margin-bottom: 20px;
}
.card {
  background: var(--glass-bg);
  backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 15px;
  text-align: center;
  transition: transform 0.3s ease;
}
.card:hover { transform: translateY(-5px); }
.prayer-icon {
  width: 50px;
  height: 50px;
  margin-bottom: 10px;
}
.prayer-title { font-weight: 600; color: var(--gold); margin-bottom: 2px; }
.arabic { font-size: 1.1rem; opacity: 0.8; margin-bottom: 8px; }
.time { font-size: 1.8rem; font-weight: bold; margin-bottom: 5px; }
.desc { font-size: 0.8rem; color: rgba(255,255,255,0.6); }

#calcInfo {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.4);
  width: 100%;
  text-align: center;
  margin-bottom: 20px;
}
#calcInfo strong {
  color: var(--gold);
}

/* Quran Section */
#quranContainer {
  width: 100%;
  margin-top: 10px;
}

#quranSearch {
  width: 100%;
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  background: var(--glass-bg);
  color: var(--text-white);
  font-size: 16px;
  margin-bottom: 15px;
}

#quranInnerTabs {
  display: flex;
  width: 100%;
  margin-bottom: 15px;
  border-bottom: 2px solid rgba(255,255,255,0.1);
}
.quran-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  color: rgba(255,255,255,0.6);
  font-weight: bold;
}
.quran-tab.active {
  color: var(--gold);
  border-bottom: 2px solid var(--gold);
}

#surahList {
  width: 100%;
  max-height: 400px;
  overflow-y: auto;
  margin-bottom: 20px;
}
.surah-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 15px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
}
.surah-info {
  display: flex;
  align-items: center;
  gap: 15px;
}
.surah-number-badge {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--glass-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gold);
  font-weight: bold;
}
.surah-details {
  display: flex;
  flex-direction: column;
}
.surah-english-name {
  font-weight: bold;
  color: var(--text-white);
}
.surah-verse-count {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.6);
}
.surah-arabic-name {
  font-family: serif;
  font-size: 1.2rem;
  color: var(--gold);
}

/* Surah Detail */
#surahDetail {
  display: none;
  width: 100%;
  flex-direction: column;
  align-items: center;
}
#surahDetailHeader {
  width: 100%;
  text-align: center;
  margin-bottom: 20px;
}
#surahHeaderTitle {
  font-size: 1.8rem;
  font-weight: bold;
  color: var(--gold);
}
#surahHeaderSub {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.6);
}
#playBtn {
  width: 100%;
  padding: 12px;
  background-color: var(--gold);
  border: none;
  border-radius: 25px;
  cursor: pointer;
  color: #333;
  font-weight: bold;
  margin-bottom: 20px;
}

#ayahsList {
  width: 100%;
}
.ayah-box {
  margin-bottom: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 15px;
  display: flex;
  flex-direction: column;
}
.ayah-num-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.ar-text {
  direction: rtl;
  font-size: 1.4rem;
  font-family: serif;
  color: var(--gold);
  background: var(--glass-bg);
  padding: 10px;
  border-radius: 10px;
  width: calc(100% - 20px);
}
.de-text {
  font-size: 0.9rem;
  color: #ddd;
  margin-top: 10px;
  padding-left: 10px;
  border-left: 2px solid var(--gold);
}

</style>
</head>

<script>
// Base64 Images for Icons
const icons = {
  Fajr: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZmlsbD0iI0ZGRDcwMCIgZD0iTTEyLDIuNUMxNywyLjUgMjEuMiw2LjcgMjEuMiwxMi4yUzE3LDIxLjggMTIsMjEuOFMDIuOCwxNy4zIDIuOCwxMS44UzcuMSwyLjUgMTIsMi41WiIvPjxwYXRoIGZpbGw9IiM0NDRGRiIgZD0iTTExLDIyQzE2LDIyIDIwLDIwIDIwLDIwQzIwLDIwIDE2LDE3IDExLDE3QzYsMTcgMiwxOSAyLDMTlDMiwxOSA2LDIyIDExLDIyWiIvPjwvc3ZnPg==",
  Shoruq: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZmlsbD0iI0ZGRDcwMCIgZD0iTTEyLDJDOC4xOSwyIDUsNS4xOSA1LDlDNSwxMi44MSAxMiwxNSAxMiwxNUMxMiwxNSAxOSwxMi44MSAxOSw5QzE5LDUuMTkgMTUuODEsMiAxMiwyWiIvPjxyZWN0IGZpbGw9IiM0NDRGRiIgeD0iMiIgeT0iMTciIHdpZHRoPSIyMCIgaGVpZ2h0PSI0IiByeD0iMiIvPjwvc3ZnPg==",
  Dhuhr: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZmlsbD0iI0ZGRDcwMCIgZD0iTTEyLDEyQzE1LjksMTIgMTksOC45IDE5LDUuNUMxOSwyLjEgMTUuOSwtMSAxMiwtMUM4LjEsLTEgNSwyLjEgNSw1LjVDNSw4LjkgOC4xLDEyIDEyLDEyWiIvPjxwYXRoIGZpbGw9IiM0NDRGRiIgZD0iTTEyLDIyQzE2LDIyIDIwLDIwIDIwLDIwQzIwLDIwIDE2LDE3IDExLDE3QzYsMTcgMiwxOSAyLDMTlDMiwxOSA2LDIyIDExLDIyWiIvPjwvc3ZnPg==",
  Asr: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZmlsbD0iI0ZGRDcwMCIgZD0iTTEyLDEyQzE1LjksMTIgMTksOC45IDE5LDUuNUMxOSwyLjEgMTUuOSwtMSAxMiwtMUM4LjEsLTEgNSwyLjEgNSw1LjVDNSw4LjkgOC4xLDEyIDEyLDEyWiIvPjxwYXRoIGZpbGw9IiM0NDRGRiIgZD0iTTEyLDIyQzE2LDIyIDIwLDIwIDIwLDIwQzIwLDIwIDE2LDE3IDExLDE3QzYsMTcgMiwxOSAyLDMTlDMiwxOSA2LDIyIDExLDIyWiIvPjwvc3ZnPg==",
  Maghrib: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZmlsbD0iI0ZGRDcwMCIgZD0iTTEyLDJDOC4xOSwyIDUsNS4xOSA1LDlDNSwxMi44MSAxMiwxNSAxMiwxNUMxMiwxNSAxOSwxMi44MSAxOSw5QzE5LDUuMTkgMTUuODEsMiAxMiwyWiIvPjxyZWN0IGZpbGw9IiM0NDRGRiIgeD0iMiIgeT0iMTciIHdpZHRoPSIyMCIgaGVpZ2h0PSI0IiByeD0iMiIvPjwvc3ZnPg==",
  Isha: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZmlsbD0iI0ZGRDcwMCIgZD0iTTEyLDIuNUMxNywyLjUgMjEuMiw2LjcgMjEuMiwxMi4yUzE3LDIxLjggMTIsMjEuOFMDIuOCwxNy4zIDIuOCwxMS44UzcuMSwyLjUgMTIsMi41WiIvPjxwYXRoIGZpbGw9IiM0NDRGRiIgZD0iTTExLDIyQzE2LDIyIDIwLDIwIDIwLDIwQzIwLDIwIDE2LDE3IDExLDE3QzYsMTcgMiwxOSAyLDMTlDMiwxOSA2LDIyIDExLDIyWiIvPjwvc3ZnPg=="
};

const prayers = [
  {id:"Fajr", name:"Fajr", arabic:"الفجر", desc:"Morgengebet"},
  {id:"Shoruq", name:"Shoruq", arabic:"الشروق", desc:""},
  {id:"Dhuhr", name:"Dhuhr", arabic:"الظهر", desc:"Mittagsgebet"},
  {id:"Asr", name:"Asr", arabic:"العصر", desc:"Nachmittagsgebet"},
  {id:"Maghrib", name:"Maghrib", arabic:"المغرب", desc:"Abendgebet"},
  {id:"Isha", name:"Isha", arabic:"العشاء", desc:"Nachtgebet"}
];

let prayerTimesObj = {};
const audioPlayer = document.getElementById("mainAudio");
const prayerGrid = document.getElementById("prayerGrid");

// Site Initialization
switchTab('prayer'); // Start on Prayer tab

// --- Core API: Prayer Times ---
function fetchPrayerTimes(lat, lon, method=3) {
  fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=${method}`)
    .then(res => res.json())
    .then(data => {
      prayerTimesObj = data.data.timings;
      renderPrayerGrid();
      startCountdown();
      updateMethodInfo();
      // Add a placeholder Shoruq (Sunrise) for the overview grid, as Aladhan API calls it "Sunrise"
      prayerTimesObj.Shoruq = prayerTimesObj.Sunrise;
    });
}

function getLocation() {
  navigator.geolocation.getCurrentPosition(
    pos => {
      fetchPrayerTimes(pos.coords.latitude, pos.coords.longitude);
      document.getElementById("cityName").innerText = `Latitude: ${pos.coords.latitude.toFixed(2)}, Longitude: ${pos.coords.longitude.toFixed(2)}`;
    },
    err => {
      alert("Standortzugriff verweigert. Standardmäßig Berlin.");
      fetchPrayerTimes(52.52, 13.40); // Fallback Berlin
      document.getElementById("cityName").innerText = "Berlin (Standard)";
    }
  );
}

function searchCity() {
  const city = document.getElementById("searchInput").value;
  if(!city) return;
  fetch(`https://api.aladhan.com/v1/timingsByAddress?address=${city}&method=3`)
    .then(res => res.json())
    .then(data => {
      if(data.data) {
        prayerTimesObj = data.data.timings;
        // Add a placeholder Shoruq (Sunrise)
        prayerTimesObj.Shoruq = prayerTimesObj.Sunrise;
        document.getElementById("cityName").innerText = data.data.location.city || city;
        renderPrayerGrid();
        startCountdown();
        updateMethodInfo();
      }
    }).catch(() => alert("Stadt nicht gefunden"));
}

function updateCalcMethod() {
  const method = document.getElementById("methodSelect").value;
  // Get current lat/lon from the footer info, not ideal but simple for this demo
  const lat = document.getElementById("currentLat").innerText;
  const lon = document.getElementById("currentLon").innerText;
  fetchPrayerTimes(lat, lon, method);
}

function startCountdown() {
  updateCountdown();
  setInterval(updateCountdown, 1000);
}

function updateCountdown() {
  if (!prayerTimesObj.Fajr) return;
  const now = new Date();
  let next = null;
  let name = "";

  prayers.forEach(p => {
    if (!prayerTimesObj[p.id]) return;
    const [h, m] = prayerTimesObj[p.id].split(":");
    let d = new Date();
    d.setHours(h, m, 0, 0);
    if (d > now && (!next || d < next)) {
      next = d;
      name = p.name;
    }
  });

  if (!next) { // Case: All today's prayers are over -> Next is tomorrow Fajr
    const [h, m] = prayerTimesObj.Fajr.split(":");
    next = new Date();
    next.setDate(next.getDate() + 1);
    next.setHours(h, m, 0, 0);
    name = "Fajr";
  }

  const diff = next - now;
  const h = Math.floor(diff / 3600000).toString().padStart(2, "0");
  const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, "0");
  const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, "0");
  
  document.getElementById("nextPrayerName").innerText = name;
  document.getElementById("nextPrayerCountdown").innerText = `${h}:${m}:${s}`;
}

function renderPrayerGrid() {
  prayerGrid.innerHTML = "";
  prayers.forEach(p => {
    const t = prayerTimesObj[p.id] || "--:--";
    const iconBase64 = icons[p.id];
    prayerGrid.innerHTML += `
      <div class="card">
        <img src="${iconBase64}" alt="${p.id} Icon" class="prayer-icon">
        <div class="prayer-title">${p.name}</div>
        <div class="arabic">${p.arabic}</div>
        <div class="time">${t}</div>
        <div class="desc">${p.desc}</div>
      </div>`;
  });
}

function updateMethodInfo() {
  const methodSelect = document.getElementById("methodSelect");
  const currentMethodName = methodSelect.options[methodSelect.selectedIndex].text;
  document.getElementById("currentMethod").innerText = currentMethodName;
  // This needs proper dynamic setting, for now Berlin fallback lat/lon
  document.getElementById("currentLat").innerText = "52.52";
  document.getElementById("currentLon").innerText = "13.40";

// --- Tabs Functionality ---
function switchTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  
  document.getElementById(`${tabId}Section`).classList.add('active');
  document.getElementById(`${tabId}Tab`).classList.add('active');

  if(tabId === 'quran') {
    loadSurahList();
  }
}

// --- Quran API: Suren/Lesezeichen ---
function switchQuranTab(tabId) {
  document.querySelectorAll('.quran-tab').forEach(tab => tab.classList.remove('active'));
  document.getElementById(`${tabId}Tab`).classList.add('active');
  
  if (tabId === 'list') {
    document.getElementById("surahList").style.display = "block";
    document.getElementById("surahDetail").style.display = "none";
    loadSurahList();
  } else {
    // Bookmark placeholder logic
    document.getElementById("surahList").style.display = "block";
    document.getElementById("surahDetail").style.display = "none";
    document.getElementById("surahList").innerHTML = "🔖 Lesezeichen anzeigen";
  }
}

function loadSurahList() {
  fetch("https://api.alquran.cloud/v1/surah")
    .then(res => res.json())
    .then(data => {
      const list = document.getElementById("surahList");
      list.innerHTML = "";
      data.data.forEach(s => {
        const surahItem = `
          <div class="surah-item" onclick="loadSurahDetail(${s.number})">
            <div class="surah-info">
              <div class="surah-number-badge">${s.number}</div>
              <div class="surah-details">
                <span class="surah-english-name">${s.englishName}</span>
                <span class="surah-verse-count">${s.numberOfAyahs} Verse</span>
              </div>
            </div>
            <div class="surah-arabic-name">${s.name}</div>
          </div>
        `;
        list.innerHTML += surahItem;
      });
    });
}

async function loadSurahDetail(surahNumber) {
  document.getElementById("surahList").style.display = "none";
  const container = document.getElementById("surahDetail");
  container.style.display = "flex";
  
  const headerSub = document.getElementById("surahHeaderSub");
  const mainPlayBtn = document.getElementById("playBtn");
  const ayahsList = document.getElementById("ayahsList");
  
  headerSub.innerText = `Sure ${surahNumber} / 114 · The Opening · -- Verse`;
  ayahsList.innerHTML = "Wird geladen...";
  mainPlayBtn.innerText = "🔀 Sure abspielen";

  try {
    const [resAr, resDe] = await Promise.all([
      fetch(`https://api.alquran.cloud/v1/surah/${surahNumber}`),
      fetch(`https://api.alquran.cloud/v1/surah/${surahNumber}/de.bubenheim`)
    ]);
    const dataAr = await resAr.json();
    const dataDe = await resDe.json();

    document.getElementById("surahHeaderTitle").innerText = `${dataAr.data.englishName} ${dataAr.data.name}`;
    headerSub.innerText = `Sure ${surahNumber} / 114 · ${dataAr.data.englishNameTranslation} · ${dataAr.data.numberOfAyahs} Verse`;
    
    let html = "";
    dataAr.data.ayahs.forEach((ayah, index) => {
      html += `
        <div class="ayah-box">
          <div class="ayah-num-row">
            <div class="surah-number-badge">${ayah.numberInSurah}</div>
          </div>
          <div class="ar-text">${ayah.text}</div>
          <div class="de-text">${dataDe.data.ayahs[index].text}</div>
        </div>`;
    });
    ayahsList.innerHTML = html;
    
    // Set audio URL (Alafasy reciter)
    audioPlayer.src = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${surahNumber}.mp3`;
  } catch (e) {
    ayahsList.innerHTML = "Fehler beim Laden.";
  }
}

function toggleAudio() {
  if (audioPlayer.paused) {
    audioPlayer.play();
    document.getElementById("playBtn").innerText = "⏸️ Pause";
  } else {
    audioPlayer.pause();
    document.getElementById("playBtn").innerText = "🔀 Sure abspielen";
  }
}
