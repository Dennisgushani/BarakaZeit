<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BarakaZeit</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* DEIN BESTEHENDES DESIGN */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#0a0b1e;color:#fff;font-family:'Inter',sans-serif;max-width:480px;margin:0 auto;overflow:hidden;position:relative}
.app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{text-align:center;padding:22px 20px 6px;flex-shrink:0}
.app-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;letter-spacing:.5px;color:#d4af37;text-shadow:0 2px 14px rgba(212,175,55,.12)}
.sub{font-size:.9rem;font-weight:500;color:#d4af37;padding:7px 10px 10px;text-shadow:0 0 16px rgba(212,175,55,.2);line-height:1.3}
.tabs{display:flex;padding:0 18px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;margin-bottom:14px}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 0 9px;font-size:.95rem;font-weight:500;color:rgba(255,255,255,.55);cursor:pointer;position:relative;transition:color .3s;user-select:none}
.tab.on{color:#d4af37;text-shadow:0 0 12px rgba(212,175,55,.2)}
.tab.on::after{content:'';position:absolute;bottom:-1px;left:18%;width:64%;height:2px;background:linear-gradient(90deg,transparent,#d4af37,transparent)}
.content{flex:1;overflow-y:auto;padding:0 18px 20px;-webkit-overflow-scrolling:touch}
.page{display:none}.page.on{display:block}

/* NEUE ELEMENTE FÜR VIBRATION & ADHAN */
.settings-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(212,175,55,0.1); }
.settings-title { color: #d4af37; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; font-weight: 700; border-bottom: 1px solid rgba(212,175,55,0.1); padding-bottom: 8px; }
.gold-btn-outline { width: 100%; background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 12px; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; margin-top: 10px; transition: 0.3s; text-transform: uppercase; }
.gold-btn-outline:active { background: rgba(212,175,55,0.1); transform: scale(0.98); }
.vibe-slider { width: 100%; accent-color: #d4af37; margin: 15px 0; }
.vibe-label { font-size: 0.75rem; color: rgba(255,255,255,0.5); display: flex; justify-content: space-between; }

/* DEIN CSS FÜR DEN QURAN & GEBETSZEITEN (Bleibt identisch) */
.srow{display:flex;gap:8px;margin-bottom:10px}.sinp{flex:1;padding:12px 16px;border-radius:24px;border:1px solid rgba(212,175,55,.2);background:rgba(255,255,255,.05);color:#fff;outline:none}.bsearch{width:48px;height:48px;border-radius:24px;border:none;background:#d4af37;display:flex;align-items:center;justify-content:center}.cinfo{text-align:center;margin-bottom:14px}.cname{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700}.next-prayer-card{background:linear-gradient(135deg,#2a2d5e 0%,#1c1e3f 100%);border:2px solid #d4af37;border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:24px}.other-prayers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.prayer-item{background:rgba(255,255,255,.05);border-radius:15px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;border:1px solid rgba(255,255,255,.1)}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="app-name">BarakaZeit</div>
</div>
<div class="sub">Genaue Gebetszeiten &amp; Der Heilige Quran</div>

<div class="tabs">
  <div class="tab on" id="tPrayer" onclick="goTab('prayer')"><span>🕌</span> Gebet</div>
  <div class="tab" id="tQuran" onclick="goTab('quran')"><span>📖</span> Quran</div>
  <div class="tab" id="tSet" onclick="goTab('settings')"><span>⚙️</span> Menü</div>
</div>

<div class="content">
  <div class="page on" id="pPrayer">
    <div class="srow">
      <input class="sinp" id="cInp" placeholder="Stadt suchen...">
      <button class="bsearch" onclick="doSearch()"><svg viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
    </div>
    <div class="cinfo">
      <div class="cname" id="cName">Menden (Sauerland)</div>
      <div class="date-container"><span class="hijri-date" id="hijriDate">--</span> | <span class="gregorian-date" id="gregDate">--</span></div>
    </div>
    <div class="next-prayer-card">
      <div class="next-label">Nächstes Gebet</div>
      <div class="next-name" id="nName">—</div>
      <div class="next-countdown" id="nCd">--:--:--</div>
    </div>
    <div class="other-prayers-grid" id="pGrid"></div>
  </div>

  <div class="page" id="pQuran">
    <div id="qSearchWrap" class="srow" style="margin-top:10px"><input class="sinp" id="qSin" placeholder="Sure suchen..." oninput="filtS()"></div>
    <div id="sList" style="margin-top:15px;"></div>
  </div>

  <div class="page" id="pSettings">
    <div class="settings-card">
      <div class="settings-title">Gebetsruf (Adhan)</div>
      <label style="font-size: 0.7rem; color: rgba(255,255,255,0.4);">ADHAN STIMME WÄHLEN</label>
      <select class="sinp" id="adhanSelect" style="width:100%; margin-top:8px; border-radius: 12px;">
        <option value="mekka">Makkah - Al-Haram</option>
        <option value="medina">Madinah - Al-Nabawi</option>
        <option value="alafasy">Mishary Rashid Alafasy</option>
      </select>
      <button class="gold-btn-outline" onclick="playAdhanTest()">Probe hören</button>
    </div>

    <div class="settings-card">
      <div class="settings-title">Vibration & Haptik</div>
      <div class="vibe-label"><span>Intensität</span><span id="vibeVal">50%</span></div>
      <input type="range" class="vibe-slider" id="vibeRange" min="0" max="100" value="50" oninput="updateVibeLabel(this.value)">
      <button class="gold-btn-outline" onclick="triggerVibe()">Vibration Testen</button>
    </div>

    <div class="settings-card">
      <div class="settings-title">Berechnungsmethode</div>
      <select class="sinp" id="mSel" onchange="doMeth()" style="width:100%; border-radius: 12px;">
        <option value="3" selected>Muslim World League (Europa)</option>
        <option value="4">Umm Al-Qura, Makkah</option>
        <option value="2">ISNA (Nordamerika)</option>
      </select>
    </div>
  </div>
</div>
</div>

<audio id="adhanAudio"></audio>

<script>
// DEINE LOGIK-VARIABLEN
var pT={}, cLa=51.4338, cLo=7.7926;

function goTab(t){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('on'));
  if(t==='prayer'){ document.getElementById('tPrayer').classList.add('on'); document.getElementById('pPrayer').classList.add('on'); }
  if(t==='quran'){ document.getElementById('tQuran').classList.add('on'); document.getElementById('pQuran').classList.add('on'); }
  if(t==='settings'){ document.getElementById('tSet').classList.add('on'); document.getElementById('pSettings').classList.add('on'); }
}

// --- NEUE FUNKTIONEN FÜR ADHAN & VIBRATION ---

function playAdhanTest() {
  const audio = document.getElementById('adhanAudio');
  const type = document.getElementById('adhanSelect').value;
  const sources = {
    'mekka': 'https://www.islamcan.com/audio/adhan/azan1.mp3',
    'medina': 'https://www.islamcan.com/audio/adhan/azan2.mp3',
    'alafasy': 'https://www.islamcan.com/audio/adhan/azan20.mp3'
  };
  audio.src = sources[type];
  audio.play();
}

function updateVibeLabel(v) { document.getElementById('vibeVal').textContent = v + '%'; }

function triggerVibe() {
  if ("vibrate" in navigator) {
    // Ein edler Doppel-Vibrations-Takt (wie ein Herzschlag)
    navigator.vibrate([150, 100, 150]);
  } else {
    alert("Vibration wird von diesem Gerät/Browser nicht unterstützt.");
  }
}

// DEIN BESTEHENDER QURAN & GEBETS-CODE (Initialisierung)
function fP(la,lo,m){
  fetch(`https://api.aladhan.com/v1/timings?latitude=${la}&longitude=${lo}&method=${m}`)
  .then(r=>r.json()).then(d=>{
    pT=d.data.timings;
    renderGrid();
    updateDates(d.data.date);
  });
}

function renderGrid(){
  let g=document.getElementById('pGrid'); g.innerHTML='';
  let keys = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
  keys.forEach(k=>{
    g.innerHTML+=`<div class="prayer-item"><span>${k}</span><strong>${pT[k]}</strong></div>`;
  });
}

function updateDates(dd){
  document.getElementById('hijriDate').textContent = dd.hijri.day + ". " + dd.hijri.month.en;
  document.getElementById('gregDate').textContent = dd.gregorian.day + ". " + dd.gregorian.month.en;
}

// Start
fP(cLa, cLo, 3);
</script>
</body>
</html>
