<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Licht des Islam</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* --- GLOBAL STYLES --- */
:root {
  --gold: #FFD700;
  --glass: rgba(255, 255, 255, 0.1);
  --bg-dark: #0A0F29;
}

body {
  font-family: 'Poppins', sans-serif;
  background:
    radial-gradient(circle at 30% 20%, rgba(138, 43, 226, 0.2) 0%, transparent 50%),
    linear-gradient(135deg, var(--bg-dark) 0%, #1A1F39 100%);
  color: #FFFFFF;
  margin: 0;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

header {
  text-align: center;
  margin-bottom: 25px;
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  margin: 0;
  color: var(--gold);
  text-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* --- SEARCH BAR --- */
#searchContainer {
  width: 100%;
  max-width: 420px;
  display: flex;
  margin-bottom: 20px;
}
#searchInput {
  flex: 1;
  padding: 12px 20px;
  border-radius: 25px 0 0 25px;
  border: none;
  background: white;
  font-size: 16px;
}
#searchBtn {
  padding: 12px 20px;
  background-color: var(--gold);
  border: none;
  border-radius: 0 25px 25px 0;
  cursor: pointer;
  font-weight: bold;
}

/* --- COUNTDOWN --- */
#nextPrayer {
  background: linear-gradient(90deg, #10b981, #059669);
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  width: 100%;
  max-width: 420px;
  margin-bottom: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* --- GRID CARDS --- */
.grid-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  width: 100%;
  max-width: 420px;
}
.card {
  background: var(--glass);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 215, 0, 0.1);
  border-radius: 20px;
  padding: 15px;
  text-align: center;
  transition: transform 0.3s ease;
}
.card:hover { transform: translateY(-5px); }
.prayer-title { font-weight: 600; color: var(--gold); margin-bottom: 2px; }
.arabic { font-size: 1.1rem; opacity: 0.8; margin-bottom: 8px; }
.time { font-size: 1.6rem; font-weight: bold; }

/* --- QURAN AREA --- */
#quranContainer {
  width: 100%;
  max-width: 420px;
  background: var(--glass);
  border-radius: 20px;
  padding: 20px;
  margin-top: 25px;
  box-sizing: border-box;
}
#surahSelect {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}
#quranText {
  max-height: 300px;
  overflow-y: auto;
  margin-top: 15px;
  font-size: 1rem;
  line-height: 1.6;
  padding-right: 10px;
}
.ayah-box {
  margin-bottom: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 10px;
}
.ar-text {
  direction: rtl;
  font-size: 1.4rem;
  font-family: serif;
  color: var(--gold);
  margin-bottom: 8px;
}
.de-text { font-size: 0.9rem; color: #ddd; }

.audioControls { display: flex; gap: 10px; margin-top: 15px; }
.audioControls button {
  flex: 1; padding: 10px; background: var(--gold);
  border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
}
</style>
</head>
<body>

<header>
  <h1>Licht des Islam</h1>
</header>

<div id="searchContainer">
  <input id="searchInput" placeholder="Stadt eingeben (z.B. Berlin)" type="text">
  <button id="searchBtn" onclick="searchCity()">Suche</button>
</div>

<div id="nextPrayer">
  <div>Nächstes Gebet: <strong id="nextPrayerName">--</strong></div>
  <div id="nextPrayerCountdown" style="font-size: 2rem; font-weight: bold;">--:--:--</div>
</div>

<div class="grid-container" id="prayerGrid"></div>

<div id="quranContainer">
  <select id="surahSelect"></select>
  <div class="audioControls">
    <button onclick="loadSurah()">📖 Laden</button>
    <button id="playBtn" onclick="toggleAudio()">▶️ Audio</button>
  </div>
  <div id="quranText">Wähle eine Sure aus...</div>
</div>

<audio id="mainAudio"></audio>

<script>
const prayers = [
  {id:"Fajr", name:"Fajr", arabic:"الفجر"},
  {id:"Sunrise", name:"Shoruq", arabic:"الشروق"},
  {id:"Dhuhr", name:"Dhuhr", arabic:"الظهر"},
  {id:"Asr", name:"Asr", arabic:"العصر"},
  {id:"Maghrib", name:"Maghrib", arabic:"المغرب"},
  {id:"Isha", name:"Isha", arabic:"العشاء"}
];

let prayerTimesObj = {};
const audioPlayer = document.getElementById("mainAudio");

// --- API: Gebetszeiten ---
function fetchPrayerTimes(lat, lon) {
  fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=3`)
    .then(res => res.json())
    .then(data => {
      prayerTimesObj = data.data.timings;
      renderPrayerGrid();
      startCountdown();
    });
}

function searchCity() {
  const city = document.getElementById("searchInput").value;
  if(!city) return;
  fetch(`https://api.aladhan.com/v1/timingsByAddress?address=${city}&method=3`)
    .then(res => res.json())
    .then(data => {
      if(data.data) {
        prayerTimesObj = data.data.timings;
        renderPrayerGrid();
        startCountdown();
      }
    }).catch(() => alert("Stadt nicht gefunden"));
}

function startCountdown() {
  updateCountdown();
  setInterval(updateCountdown, 1000);
}

function updateCountdown() {
  if (!prayerTimesObj.Fajr) return;
  const now = new Date();
  let next = null;
  let name = "";

  prayers.forEach(p => {
    const [h, m] = prayerTimesObj[p.id].split(":");
    let d = new Date();
    d.setHours(h, m, 0, 0);
    if (d > now && (!next || d < next)) {
      next = d;
      name = p.name;
    }
  });

  if (!next) { // Falls alle Gebete heute vorbei sind -> Morgen Fajr
    const [h, m] = prayerTimesObj.Fajr.split(":");
    next = new Date();
    next.setDate(next.getDate() + 1);
    next.setHours(h, m, 0, 0);
    name = "Fajr";
  }

  const diff = next - now;
  const h = Math.floor(diff / 3600000).toString().padStart(2, "0");
  const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, "0");
  const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, "0");
  
  document.getElementById("nextPrayerName").innerText = name;
  document.getElementById("nextPrayerCountdown").innerText = `${h}:${m}:${s}`;
}

function renderPrayerGrid() {
  const grid = document.getElementById("prayerGrid");
  grid.innerHTML = "";
  prayers.forEach(p => {
    const t = prayerTimesObj[p.id] || "--:--";
    grid.innerHTML += `
      <div class="card">
        <div class="prayer-title">${p.name}</div>
        <div class="arabic">${p.arabic}</div>
        <div class="time">${t}</div>
      </div>`;
  });
}

// --- API: Quran ---
fetch("https://api.alquran.cloud/v1/surah")
  .then(res => res.json())
  .then(data => {
    const sel = document.getElementById("surahSelect");
    data.data.forEach(s => {
      sel.innerHTML += `<option value="${s.number}">${s.number}. ${s.englishName} (${s.name})</option>`;
    });
  });

async function loadSurah() {
  const num = document.getElementById("surahSelect").value;
  const container = document.getElementById("quranText");
  container.innerHTML = "Wird geladen...";

  try {
    const [resAr, resDe] = await Promise.all([
      fetch(`https://api.alquran.cloud/v1/surah/${num}`),
      fetch(`https://api.alquran.cloud/v1/surah/${num}/de.bubenheim`)
    ]);
    const dataAr = await resAr.json();
    const dataDe = await resDe.json();

    let html = "";
    dataAr.data.ayahs.forEach((ayah, index) => {
      html += `
        <div class="ayah-box">
          <div class="ar-text">${ayah.text}</div>
          <div class="de-text">${dataDe.data.ayahs[index].text}</div>
        </div>`;
    });
    container.innerHTML = html;
    
    // Audio URL setzen (Afsay Rezitator als Beispiel)
    audioPlayer.src = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${num}.mp3`;
    document.getElementById("playBtn").innerText = "▶️ Audio";
  } catch (e) {
    container.innerHTML = "Fehler beim Laden.";
  }
}

function toggleAudio() {
  if (audioPlayer.paused) {
    audioPlayer.play();
    document.getElementById("playBtn").innerText = "⏸️ Pause";
  } else {
    audioPlayer.pause();
    document.getElementById("playBtn").innerText = "▶️ Audio";
  }
}

// Standort-Initialisierung
navigator.geolocation.getCurrentPosition(
  pos => fetchPrayerTimes(pos.coords.latitude, pos.coords.longitude),
  err => fetchPrayerTimes(52.52, 13.40) // Fallback Berlin
);
</script>
</body>
</html>
