<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BarakaZeit</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* DEIN ORIGINALES DESIGN */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#0a0b1e;color:#fff;font-family:'Inter',sans-serif;max-width:480px;margin:0 auto;overflow:hidden;position:relative}
.app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{text-align:center;padding:22px 20px 6px;flex-shrink:0}
.app-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;letter-spacing:.5px;color:#d4af37;text-shadow:0 2px 14px rgba(212,175,55,.12)}
.sub{font-size:.9rem;font-weight:500;color:#d4af37;padding:7px 10px 10px;text-shadow:0 0 16px rgba(212,175,55,.2);line-height:1.3}
.tabs{display:flex;padding:0 18px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;margin-bottom:14px}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 0 9px;font-size:.95rem;font-weight:500;color:rgba(255,255,255,.55);cursor:pointer;position:relative;transition:color .3s;user-select:none}
.tab.on{color:#d4af37;text-shadow:0 0 12px rgba(212,175,55,.2)}
.tab.on::after{content:'';position:absolute;bottom:-1px;left:18%;width:64%;height:2px;background:linear-gradient(90deg,transparent,#d4af37,transparent)}
.content{flex:1;overflow-y:auto;padding:0 18px 20px;-webkit-overflow-scrolling:touch}
.page{display:none}.page.on{display:block}

/* STYLE FÜR EINSTELLUNGEN */
.settings-grid { display: flex; flex-direction: column; gap: 15px; }
.p-row { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(212,175,55,0.2); }
.p-row-title { color: #d4af37; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; }
.opt-box { display: flex; gap: 10px; align-items: center; margin-top: 5px; }
select.mini-select { background: #1a1a2e; color: #fff; border: 1px solid #d4af37; padding: 5px; border-radius: 5px; font-size: 0.8rem; flex: 1; }
input[type="checkbox"] { accent-color: #d4af37; transform: scale(1.2); }

/* QURAN LISTE */
.s-item { background: rgba(255,255,255,0.05); margin-bottom: 8px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.s-num { color: #d4af37; font-weight: bold; margin-right: 10px; }
</style>
</head>
<body>
<div class="app">
    <div class="hdr"><div class="app-name">BarakaZeit</div></div>
    <div class="sub">Menden (Sauerland)</div>

    <div class="tabs">
        <div class="tab on" onclick="goTab('prayer', this)">🕌 Gebet</div>
        <div class="tab" onclick="goTab('quran', this)">📖 Quran</div>
        <div class="tab" onclick="goTab('settings', this)">⚙️ Setup</div>
    </div>

    <div class="content">
        <div id="page-prayer" class="page on">
            <div id="timer-box" style="text-align:center; padding: 20px; background: rgba(212,175,55,0.1); border-radius: 20px; margin-bottom: 20px;">
                <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;">Nächstes Gebet</div>
                <div id="next-name" style="font-size: 1.8rem; font-weight: bold; color: #d4af37;">--</div>
                <div id="countdown" style="font-size: 2.5rem; font-family: monospace;">00:00:00</div>
            </div>
            <div id="prayer-list"></div>
        </div>

        <div id="page-quran" class="page">
            <input type="text" id="qSearch" class="p-row" style="width:100%; margin-bottom:15px; background:rgba(255,255,255,0.05); color:white; border:1px solid #d4af37;" placeholder="Sure suchen..." onkeyup="filterQuran()">
            <div id="surah-list">Lade Suren...</div>
        </div>

        <div id="page-settings" class="page">
            <h3 style="color:#d4af37; margin-bottom:15px;">Benachrichtigungen</h3>
            <div class="settings-grid" id="settings-container">
                </div>
        </div>
    </div>
</div>

<audio id="adhanPlayer"></audio>

<script>
const prayerNames = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
let prayerTimes = {};
let config = JSON.parse(localStorage.getItem('barakaConfig')) || {
    adhan: { Fajr: 'none', Dhuhr: 'default', Asr: 'default', Maghrib: 'default', Isha: 'default' },
    vibe: { Fajr: true, Dhuhr: true, Asr: true, Maghrib: true, Isha: true }
};

// TAB NAVIGATION
function goTab(pageId, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.getElementById('page-' + pageId).classList.add('on');
    el.classList.add('on');
    if(pageId === 'quran') loadSurahs();
    if(pageId === 'settings') renderSettings();
}

// QURAN LOGIK
async function loadSurahs() {
    const res = await fetch('https://api.alquran.cloud/v1/surah');
    const data = await res.json();
    const list = document.getElementById('surah-list');
    list.innerHTML = data.data.map(s => `
        <div class="s-item">
            <span><span class="s-num">${s.number}</span> ${s.englishName}</span>
            <span style="font-family:'Amiri'">${s.name}</span>
        </div>
    `).join('');
}

function filterQuran() {
    let val = document.getElementById('qSearch').value.toLowerCase();
    document.querySelectorAll('.s-item').forEach(item => {
        item.style.display = item.innerText.toLowerCase().includes(val) ? 'flex' : 'none';
    });
}

// GEBETSZEITEN & TIMER
async function getPrays() {
    const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Menden&country=Germany&method=3');
    const data = await res.json();
    prayerTimes = data.data.timings;
    renderPrayers();
    startTimer();
}

function renderPrayers() {
    const list = document.getElementById('prayer-list');
    list.innerHTML = prayerNames.map(p => `
        <div class="p-row" style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>${p}</span>
            <strong style="color:#d4af37">${prayerTimes[p]}</strong>
        </div>
    `).join('');
}

function startTimer() {
    setInterval(() => {
        let now = new Date();
        let times = prayerNames.map(n => {
            let t = prayerTimes[n].split(':');
            let d = new Date(); d.setHours(t[0], t[1], 0);
            if (d < now) d.setDate(d.getDate() + 1);
            return { name: n, diff: d - now, time: d };
        }).sort((a,b) => a.diff - b.diff);

        let next = times[0];
        document.getElementById('next-name').innerText = next.name;
        
        let h = Math.floor(next.diff/3600000);
        let m = Math.floor((next.diff%3600000)/60000);
        let s = Math.floor((next.diff%60000)/1000);
        document.getElementById('countdown').innerText = 
            `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

        if (next.diff < 1000) triggerAlarm(next.name);
    }, 1000);
}

// EINSTELLUNGEN RENDERN (Adhan & Vibe pro Gebet)
function renderSettings() {
    const container = document.getElementById('settings-container');
    const adhanOptions = [
        {val: 'none', txt: 'Aus'},
        {val: 'https://www.islamcan.com/audio/adhan/azan1.mp3', txt: 'Mekka'},
        {val: 'https://www.islamcan.com/audio/adhan/azan2.mp3', txt: 'Medina'},
        {val: 'https://www.islamcan.com/audio/adhan/azan20.mp3', txt: 'Alafasy'},
        {val: 'https://www.islamcan.com/audio/adhan/azan16.mp3', txt: 'Ägypten'}
    ];

    container.innerHTML = prayerNames.map(p => `
        <div class="p-row">
            <div class="p-row-title"><span>${p}</span></div>
            <div class="opt-box">
                <select class="mini-select" onchange="saveCfg('${p}', 'adhan', this.value)">
                    ${adhanOptions.map(o => `<option value="${o.val}" ${config.adhan[p] === o.val ? 'selected' : ''}>${o.txt}</option>`).join('')}
                </select>
                <label style="font-size:0.7rem">📳 <input type="checkbox" ${config.vibe[p] ? 'checked' : ''} onchange="saveCfg('${p}', 'vibe', this.checked)"></label>
            </div>
        </div>
    `).join('');
}

function saveCfg(prayer, type, val) {
    config[type][prayer] = val;
    localStorage.setItem('barakaConfig', JSON.stringify(config));
}

function triggerAlarm(name) {
    // Vibration
    if (config.vibe[name] && "vibrate" in navigator) {
        navigator.vibrate([500, 200, 500, 200, 500]);
    }
    // Adhan
    if (config.adhan[name] !== 'none') {
        let player = document.getElementById('adhanPlayer');
        player.src = config.adhan[name];
        player.play();
    }
}

// Init
getPrays();
</script>
</body>
</html>
