<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islam App</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
}
header {
  background: #16a34a;
  padding: 15px;
  font-size: 20px;
}
.card {
  background: #1e293b;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
}
button {
  background: #16a34a;
  color: white;
  border: none;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>🕌 Gebetszeiten & Quran</header>

<div class="card">
  <h2>📍 Dein Standort</h2>
  <p id="location">Lädt...</p>
</div>

<div class="card">
  <h2>🕐 Gebetszeiten</h2>
  <div id="prayerTimes">Lädt...</div>
</div>

<div class="card">
  <h2>📖 Quran</h2>
  <select id="surahSelect"></select>
  <button onclick="loadSurah()">Laden</button>
  <div id="quranText" style="margin-top:10px;"></div>
</div>

<script>
// Standort holen
navigator.geolocation.getCurrentPosition(pos => {
  let lat = pos.coords.latitude;
  let lon = pos.coords.longitude;

  document.getElementById("location").innerText =
    "Lat: " + lat.toFixed(2) + " | Lon: " + lon.toFixed(2);

  // Gebetszeiten API
  fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2`)
    .then(res => res.json())
    .then(data => {
      let t = data.data.timings;
      document.getElementById("prayerTimes").innerHTML = `
        Fajr: ${t.Fajr}<br>
        Dhuhr: ${t.Dhuhr}<br>
        Asr: ${t.Asr}<br>
        Maghrib: ${t.Maghrib}<br>
        Isha: ${t.Isha}
      `;
    });
});

// Surah Liste laden
fetch("https://api.alquran.cloud/v1/surah")
  .then(res => res.json())
  .then(data => {
    let select = document.getElementById("surahSelect");
    data.data.forEach(surah => {
      let opt = document.createElement("option");
      opt.value = surah.number;
      opt.text = surah.number + " - " + surah.englishName;
      select.appendChild(opt);
    });
  });

// Quran laden
function loadSurah() {
  let num = document.getElementById("surahSelect").value;
  fetch(`https://api.alquran.cloud/v1/surah/${num}/de.asad`)
    .then(res => res.json())
    .then(data => {
      let text = data.data.ayahs.map(a => a.text).join("<br><br>");
      document.getElementById("quranText").innerHTML = text;
    });
}
</script>

</body>
</html>
