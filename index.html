<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BarakaZeit Pro | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #060714; --glass: rgba(255, 255, 255, 0.05); --active: rgba(212, 175, 55, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        .app-shell { max-width: 480px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #1a1b3a, #060714); border-right: 1px solid rgba(255,255,255,0.05); border-left: 1px solid rgba(255,255,255,0.05); }
        
        /* Header */
        header { padding: 30px 20px 10px; text-align: center; flex-shrink: 0; }
        .logo { font-family: 'Amiri', serif; font-size: 2.2rem; color: var(--gold); margin-bottom: 5px; }
        .location-tag { font-size: 0.75rem; color: #aeb1d8; opacity: 0.8; letter-spacing: 1px; }

        /* Content Area */
        .main-scroll { flex: 1; overflow-y: auto; padding: 15px; scrollbar-width: none; -ms-overflow-style: none; }
        .main-scroll::-webkit-scrollbar { display: none; }
        .page { display: none; animation: slideIn 0.3s ease-out; }
        .page.active { display: block; }

        /* Gebets-Karten */
        .prayer-card { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .prayer-card.highlight { border-color: var(--gold); background: var(--active); box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
        .p-info h3 { font-size: 0.85rem; text-transform: uppercase; color: #888; margin-bottom: 4px; }
        .p-info .time { font-size: 1.8rem; font-weight: 700; }
        .p-info .arabic { font-family: 'Amiri', serif; color: var(--gold); margin-left: 10px; font-size: 1.2rem; }
        
        .adhan-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; }
        .adhan-btn.muted { filter: grayscale(1); opacity: 0.3; }

        /* Kompass */
        .qibla-box { text-align: center; padding: 20px; }
        .compass-wrap { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        #compass-disc { width: 100%; height: 100%; transition: transform 0.2s cubic-bezier(0.1, 0.5, 0.1, 1); filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2)); }
        .kaaba-indicator { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); color: red; font-size: 1.5rem; z-index: 10; text-shadow: 0 0 10px red; }

        /* Navigations-Leiste */
        nav { background: rgba(10, 11, 30, 0.95); backdrop-filter: blur(15px); display: flex; padding: 15px 0; border-top: 1px solid rgba(212, 175, 55, 0.2); flex-shrink: 0; }
        .nav-link { flex: 1; text-align: center; color: #666; font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .nav-link.active { color: var(--gold); }
        .nav-link i { display: block; font-size: 1.5rem; margin-bottom: 4px; font-style: normal; }

        /* Button & Inputs */
        .btn { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .input-box { background: var(--glass); border: 1px solid rgba(212,175,55,0.3); padding: 12px; border-radius: 10px; color: #fff; width: 100%; margin-bottom: 10px; outline: none; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-shell">
    <header>
        <div class="logo">بركة Zeit</div>
        <div class="location-tag" id="loc-display">Menden, DE</div>
    </header>

    <div class="main-scroll">
        <div id="page-pray" class="page active">
            <div id="prayer-container">
                </div>
            <p style="text-align: center; font-size: 0.7rem; color: #555; margin-top: 20px;">
                Adhan wird nur abgespielt, wenn die App im Vordergrund aktiv ist.
            </p>
        </div>

        <div id="page-qibla" class="page">
            <div class="qibla-box">
                <h3 style="color: var(--gold); margin-bottom: 10px;">Qibla Finder</h3>
                <div class="compass-wrap">
                    <div class="kaaba-indicator">▼</div>
                    <img id="compass-disc" src="https://i.imgur.com/8X5f2Xl.png" alt="Compass">
                </div>
                <p id="q-angle" style="margin-top: 15px; font-weight: bold;">Warte auf Sensor...</p>
                <button class="btn" onclick="initCompass()">Sensor aktivieren</button>
            </div>
        </div>

        <div id="page-settings" class="page">
            <h3 style="color: var(--gold); margin-bottom: 15px;">Konfiguration</h3>
            <div style="margin-bottom: 20px;">
                <label style="font-size: 0.8rem; display: block; margin-bottom: 5px;">Standort manuell ändern:</label>
                <input type="text" id="city-inp" class="input-box" placeholder="Stadt eingeben...">
                <button class="btn" onclick="updateLocationManually()">Aktualisieren</button>
            </div>
            <div>
                <label style="font-size: 0.8rem; display: block; margin-bottom: 5px;">Berechnungsmethode:</label>
                <select id="meth-sel" class="input-box" onchange="loadPrayers()">
                    <option value="3">Muslim World League</option>
                    <option value="13">Diyanet (Türkei)</option>
                    <option value="2">ISNA (Nordamerika)</option>
                    <option value="4">Umm Al-Qura (Makkah)</option>
                </select>
            </div>
            <button class="btn" style="background: #444; color: #fff; margin-top: 30px;" onclick="testAdhan()">🔊 Adhan Probe hören</button>
        </div>
    </div>

    <nav>
        <div class="nav-link active" onclick="nav('pray', this)"><i>🕌</i>Gebet</div>
        <div class="nav-link" onclick="nav('qibla', this)"><i>🧭</i>Qibla</div>
        <div class="nav-link" onclick="nav('settings', this)"><i>⚙️</i>Optionen</div>
    </nav>
</div>

<audio id="adhan-audio" preload="auto">
    <source src="https://www.islamcan.com/audio/adhan/adhan1.mp3" type="audio/mpeg">
</audio>

<script>
    let lat = 51.4338;
    let lon = 7.7926;
    let prayersData = {};
    let adhanSettings = { Fajr:true, Dhuhr:true, Asr:true, Maghrib:true, Isha:true };
    let qiblaAngle = 0;

    window.onload = () => {
        // GPS Check
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                lat = p.coords.latitude; lon = p.coords.longitude;
                document.getElementById('loc-display').innerText = "Standort erkannt (GPS)";
                loadPrayers();
            }, () => loadPrayers());
        } else { loadPrayers(); }
        
        // Background Watcher
        setInterval(checkForAdhan, 30000); // Alle 30 Sekunden prüfen
    };

    function nav(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-'+pageId).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
    }

    async function loadPrayers() {
        const meth = document.getElementById('meth-sel').value;
        const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=${meth}`);
        const json = await res.json();
        prayersData = json.data.timings;
        renderPrayers();
        calcQibla();
    }

    function renderPrayers() {
        const keys = {Fajr:'Fajr', Dhuhr:'Dhuhr', Asr:'Asr', Maghrib:'Maghrib', Isha:'Isha'};
        const container = document.getElementById('prayer-container');
        container.innerHTML = "";
        
        const now = new Date();
        const currentTimeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');

        Object.keys(keys).forEach(k => {
            const isHighlight = prayersData[k] > currentTimeStr; // Sehr vereinfachter Check
            container.innerHTML += `
                <div class="prayer-card ${isHighlight ? '' : 'highlight'}">
                    <div class="p-info">
                        <h3>${k} <span class="arabic">${getArName(k)}</span></h3>
                        <div class="time">${prayersData[k]}</div>
                    </div>
                    <div class="adhan-btn ${adhanSettings[k] ? '' : 'muted'}" onclick="toggleAdhan('${k}', this)">
                        ${adhanSettings[k] ? '🔔' : '🔕'}
                    </div>
                </div>
            `;
        });
    }

    function getArName(k) {
        const names = {Fajr:'الفجر', Dhuhr:'الظهر', Asr:'العصر', Maghrib:'المغرب', Isha:'العشاء'};
        return names[k] || "";
    }

    function toggleAdhan(k, el) {
        adhanSettings[k] = !adhanSettings[k];
        renderPrayers();
    }

    function testAdhan() {
        const a = document.getElementById('adhan-audio');
        a.currentTime = 0;
        a.play().catch(e => alert("Bitte klicke einmal auf die Seite, um Audio zu erlauben."));
    }

    function checkForAdhan() {
        const now = new Date();
        const timeNow = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        
        for (let p in adhanSettings) {
            if (adhanSettings[p] && prayersData[p] === timeNow) {
                testAdhan();
                break; 
            }
        }
    }

    // --- KOMPASS LOGIK ---
    function calcQibla() {
        const mLat = 21.4225 * Math.PI / 180;
        const mLon = 39.8262 * Math.PI / 180;
        const uLat = lat * Math.PI / 180;
        const uLon = lon * Math.PI / 180;
        
        const y = Math.sin(mLon - uLon);
        const x = Math.cos(uLat) * Math.tan(mLat) - Math.sin(uLat) * Math.cos(mLon - uLon);
        qiblaAngle = Math.atan2(y, x) * 180 / Math.PI;
        if (qiblaAngle < 0) qiblaAngle += 360;
    }

    function initCompass() {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(state => {
                if(state === 'granted') window.addEventListener('deviceorientation', handleRotate);
            });
        } else {
            window.addEventListener('deviceorientation', handleRotate);
        }
    }

    function handleRotate(e) {
        let heading = e.webkitCompassHeading || (360 - e.alpha);
        if (heading) {
            const disc = document.getElementById('compass-disc');
            // Die Nadel (Kaaba-Indikator) zeigt auf 0 Grad der App. 
            // Das Zifferblatt muss so gedreht werden, dass die Differenz stimmt.
            const totalRotate = qiblaAngle - heading;
            disc.style.transform = `rotate(${totalRotate}deg)`;
            document.getElementById('q-angle').innerText = `Kaaba: ${Math.round(qiblaAngle)}° | Kompass: ${Math.round(heading)}°`;
        }
    }

    async function updateLocationManually() {
        const city = document.getElementById('city-inp').value;
        if(!city) return;
        const res = await fetch(`https://api.aladhan.com/v1/timingsByAddress?address=${encodeURIComponent(city)}`);
        const d = await res.json();
        if(d.data) {
            lat = d.data.meta.latitude;
            lon = d.data.meta.longitude;
            document.getElementById('loc-display').innerText = city;
            loadPrayers();
            alert("Erfolgreich aktualisiert!");
        }
    }
</script>
</body>
</html>
