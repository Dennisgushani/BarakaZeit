<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islam App</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

/* Header */
header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
  background: rgba(22,163,74,0.8);
  backdrop-filter: blur(10px);
}

/* Cards */
.container {
  padding: 10px;
}

.card {
  background: rgba(30,41,59,0.7);
  backdrop-filter: blur(15px);
  border-radius: 15px;
  padding: 15px;
  margin: 12px;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

/* Titles */
h2 {
  margin-top: 0;
}

/* Buttons */
button {
  background: linear-gradient(45deg, #16a34a, #22c55e);
  border: none;
  padding: 10px;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  margin-top: 10px;
  width: 100%;
}

/* Select */
select {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: none;
  margin-top: 5px;
}

/* Quran Text */
#quranText {
  margin-top: 10px;
  max-height: 300px;
  overflow-y: auto;
  line-height: 1.6;
}

/* Smooth animation */
.card {
  transition: transform 0.2s;
}
.card:hover {
  transform: scale(1.02);
}
</style>

</head>

<body>

<header>🕌 Islam App</header>

<div class="container">

<div class="card">
  <h2>📍 Standort</h2>
  <p id="location">Lädt...</p>
</div>

<div class="card">
  <h2>🕐 Gebetszeiten</h2>
  <div id="prayerTimes">Lädt...</div>
</div>

<div class="card">
  <h2>📖 Quran</h2>
  <select id="surahSelect"></select>
  <button onclick="loadSurah()">📥 Laden</button>
  <div id="quranText"></div>
</div>

</div>

<script>
navigator.geolocation.getCurrentPosition(pos => {
  let lat = pos.coords.latitude;
  let lon = pos.coords.longitude;

  document.getElementById("location").innerText =
    "Lat: " + lat.toFixed(2) + " | Lon: " + lon.toFixed(2);

  fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2`)
    .then(res => res.json())
    .then(data => {
      let t = data.data.timings;
      document.getElementById("prayerTimes").innerHTML = `
        🌅 Fajr: ${t.Fajr}<br>
        ☀️ Dhuhr: ${t.Dhuhr}<br>
        🌤 Asr: ${t.Asr}<br>
        🌇 Maghrib: ${t.Maghrib}<br>
        🌙 Isha: ${t.Isha}
      `;
    });
});

fetch("https://api.alquran.cloud/v1/surah")
  .then(res => res.json())
  .then(data => {
    let select = document.getElementById("surahSelect");
    data.data.forEach(surah => {
      let opt = document.createElement("option");
      opt.value = surah.number;
      opt.text = surah.number + " - " + surah.englishName;
      select.appendChild(opt);
    });
  });

function loadSurah() {
  let num = document.getElementById("surahSelect").value;
  fetch(`https://api.alquran.cloud/v1/surah/${num}/de.asad`)
    .then(res => res.json())
    .then(data => {
      let text = data.data.ayahs.map(a => a.text).join("<br><br>");
      document.getElementById("quranText").innerHTML = text;
    });
}
</script>

</body>
</html>
