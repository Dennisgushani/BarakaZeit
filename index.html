<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BarakaZeit</title>
<!-- PWA Verknüpfungen -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#D4AF37">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Einbindung der Berechnungs-Library (wird vom SW gecached) -->
<script src="https://cdn.jsdelivr.net/npm/adhan@4.0.9/Adhan.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* --- BASIS STYLES & RESET --- */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#0d061f;color:#fff;font-family:'Inter',sans-serif;max-width:480px;margin:0 auto;overflow:hidden;position:relative}
.app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* --- HEADER & TABS --- */
.hdr{text-align:center;padding:22px 20px 10px;flex-shrink:0}
.app-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;letter-spacing:.5px;color:#c5a059;text-shadow:0 2px 14px rgba(197,160,89,.15)}
.tabs{display:flex;padding:0 18px 10px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 0 8px;font-size:.95rem;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;position:relative;transition:color .3s;user-select:none}
.tab.on{color:#c5a059}
.tab.on::after{content:'';position:absolute;bottom:0;left:20%;width:60%;height:2px;background:#c5a059}

.content{flex:1;overflow-y:auto;padding:0 15px 20px;-webkit-overflow-scrolling:touch}
.page{display:none}.page.on{display:block;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* --- DEIN NEUES WIDGET DESIGN --- */
/* Nächstes Gebet Bereich (Groß) */
.next-prayer-container {
    text-align: center;
    margin-bottom: 20px;
    background: linear-gradient(145deg, #251b45, #1a1333);
    padding: 25px 20px;
    border-radius: 25px;
    width: 100%;
    border: 1px solid #c5a059;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.timer-label {
    color: #c5a059;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

#countdown {
    font-size: 3rem;
    font-weight: 200;
    margin: 5px 0;
    font-family: 'Inter', sans-serif;
    letter-spacing: 2px;
}

#next-prayer-name {
    font-size: 1.1rem;
    font-weight: 600;
    color: #c5a059;
}

/* Alle Zeiten (Raster unten) */
.all-times-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3 Spalten */
    gap: 10px;
    width: 100%;
}

.mini-card {
    background: rgba(255, 255, 255, 0.05);
    padding: 12px 5px;
    border-radius: 15px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s;
}

.mini-label {
    font-size: 0.65rem;
    opacity: 0.6;
    margin-bottom: 4px;
    text-transform: uppercase;
}

.mini-time {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
}

.mini-card.active-prayer {
    background: rgba(197, 160, 89, 0.15);
    border-color: #c5a059;
    box-shadow: 0 0 10px rgba(197, 160, 89, 0.2);
}
.mini-card.active-prayer .mini-time {
    color: #c5a059;
}

/* Controls (Standort) */
.controls-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
}
.sinp {
    flex: 1;
    padding: 10px 15px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 0.9rem;
}
.bsearch {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: #c5a059;
    color: #0d061f;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Quran Styles (Vereinfacht für den Fokus) */
.quran-list {
    list-style: none;
}
.quran-item {
    padding: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    justify-content: space-between;
}

</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="app-name">BarakaZeit</div>
</div>
<div class="tabs">
  <div class="tab on" id="tPrayer" onclick="switchTab('prayer')"><span>🕌</span> Gebete</div>
  <div class="tab" id="tQuran" onclick="switchTab('quran')"><span>📖</span> Quran</div>
</div>
<div class="content">

<!-- PAGE 1: GEBETSZEITEN (Dein Design) -->
<div class="page on" id="pPrayer">
  
  <!-- Controls (Optional: Stadt ändern) -->
  <div class="controls-bar">
    <input class="sinp" id="cInp" placeholder="Koordinaten eingeben (z.B. 51.43, 7.79)">
    <button class="bsearch" onclick="updateCoordsFromInput()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
  </div>

  <div class="next-prayer-container">
    <div class="timer-label">Nächstes Gebet in</div>
    <div id="countdown">--:--:--</div>
    <div id="next-prayer-name">Lädt...</div>
  </div>

  <div class="all-times-grid" id="prayer-list">
    <!-- Wird per JS gefüllt -->
    <div class="loading" style="grid-column: 1/-1; text-align:center; padding:20px; color:#aaa;">Berechne Zeiten...</div>
  </div>

</div>

<!-- PAGE 2: QURAN -->
<div class="page" id="pQuran">
  <div style="padding: 20px; text-align: center;">
    <h3 style="color:#c5a059; margin-bottom:10px;">Der Heilige Quran</h3>
    <p style="color:#aaa; font-size:0.9rem;">Offline-Modus aktiv. Ladezeiten können variieren.</p>
    <ul class="quran-list" id="quran-list">
        <!-- Wird per JS gefüllt -->
    </ul>
  </div>
</div>

</div>
</div>

<script>
// ===== KONFIGURATION & DATEN =====
// Standardkoordinaten (Menden)
let userLat = 51.4338;
let userLon = 7.7926;
let prayerTimesData = {};
let nextPrayerObj = null;
let countdownInterval = null;

// Initialisierung
function initApp() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
        calculateAndRender();
      },
      () => {
        // Fallback falls GPS verweigert
        calculateAndRender();
      }
    );
  } else {
    calculateAndRender();
  }
}

// Berechnung mit Adhan.js
function calculateAndRender() {
  try {
    const coordinates = new Adhan.Coordinates(userLat, userLon);
    const params = Adhan.CalculationMethod.MuslimWorldLeague();
    params.madhab = Adhan.Madhab.Shafi;
    
    // Zeiten für HEUTE
    const date = new Date();
    const times = new Adhan.PrayerTimes(coordinates, date, params);
    
    // Daten speichern
    prayerTimesData = {
      Fajr: times.fajr,
      Sunrise: times.sunrise,
      Dhuhr: times.dhuhr,
      Asr: times.asr,
      Maghrib: times.maghrib,
      Isha: times.isha
    };

    updateWidget(); // UI aktualisieren
    
    // Countdown starten
    if(countdownInterval) clearInterval(countdownInterval);
    countdownInterval = setInterval(updateWidget, 1000);

  } catch (e) {
    console.error("Berechnungsfehler:", e);
  }
}

// UI Update Funktion (Dein Widget-Code angepasst)
function updateWidget() {
    const now = new Date();
    let nextPrayer = null;
    let minDiff = Infinity;

    const listContainer = document.getElementById('prayer-list');
    listContainer.innerHTML = '';

    // Durchlaufe alle Gebete
    Object.entries(prayerTimesData).forEach(([name, timeDate]) => {
        // timeDate ist ein Date-Objekt von adhan.js
        // Wir formatieren es für die Anzeige
        const timeStr = timeDate.toLocaleTimeString('de-DE', {hour: '2-digit', minute: '2-digit'});

        // Prüfen ob Gebet heute noch stattfindet
        const prayerDateToday = new Date(timeDate);
        
        // Logik für "Nächstes Gebet"
        // Wenn die Uhrzeit heute schon vorbei ist, nehmen wir morgen für den Vergleich
        let compareDate = new Date(prayerDateToday);
        if (compareDate < now) {
            compareDate.setDate(compareDate.getDate() + 1);
        }

        const diff = compareDate - now;
        
        // Finde das kleinste positive Diff
        if (diff < minDiff) {
            minDiff = diff;
            nextPrayer = { name, date: compareDate, time: timeStr };
        }

        // Karten erstellen
        const card = document.createElement('div');
        card.className = 'mini-card';
        // Markiere aktuelles/nächstes Gebet (optional)
        if (name === nextPrayer.name) card.classList.add('active-prayer');
        
        card.innerHTML = `<div class="mini-label">${name}</div><div class="mini-time">${timeStr}</div>`;
        listContainer.appendChild(card);
    });

    // Countdown anzeigen
    if (nextPrayer) {
        const h = Math.floor(minDiff / 3600000);
        const m = Math.floor((minDiff % 3600000) / 60000);
        const s = Math.floor((minDiff % 60000) / 1000);

        document.getElementById('countdown').innerText = 
            `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        document.getElementById('next-prayer-name').innerText = nextPrayer.name;
    } else {
        document.getElementById('countdown').innerText = "--:--:--";
        document.getElementById('next-prayer-name').innerText = "Warte auf Zeiten...";
    }
}

// Hilfsfunktionen
function updateCoordsFromInput() {
  const val = document.getElementById('cInp').value;
  const parts = val.split(',');
  if(parts.length === 2) {
    const lat = parseFloat(parts[0]);
    const lon = parseFloat(parts[1]);
    if(!isNaN(lat) && !isNaN(lon)) {
      userLat = lat;
      userLon = lon;
      calculateAndRender();
    }
  }
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.getElementById('t' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('on');
    
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.getElementById('p' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('on');
}

// Service Worker Registration (Offline-Fähigkeit)
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(() => console.log("App ist offline-fähig!"));
}

// Start
initApp();

</script>
</body>
</html>
